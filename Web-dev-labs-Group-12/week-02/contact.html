<!DOCTYPE html>
<html lang="en">
<head>
  <title>Contact</title>
</head>
<body>
  <h1>Contact Form</h1>
  <form action="#" method="post">
    <p>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name">
    </p>
    <p>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email">
    </p>
    <p>
      <label for="message">Message:</label>
      <textarea id="message" name="message"></textarea>
    </p>
    <p>
      <button type="submit">Submit</button>
    </p>
  </form>

  <h1>Registration Form</h1>
  <form action="#" method="post">
    <table border="1">
      <tr>
        <td>Full Name</td>
        <td><input type="text" name="fullName" required placeholder="Full Name"></td>
      </tr>
      <tr>
        <td>Email</td>
        <td><input type="email" name="email" required placeholder="Email"></td>
      </tr>
      <tr>
        <td>Password</td>
        <td><input type="password" name="password" required placeholder="Password"></td>
      </tr>
      <tr>
        <td>Gender</td>
        <td>
          <input type="radio" id="male" name="gender" value="male">
          <label for="male">Male</label>
          <input type="radio" id="female" name="gender" value="female">
          <label for="female">Female</label>
        </td>
      </tr>
      <tr>
        <td>Courses</td>
        <td>
          <input type="checkbox" id="html" name="courses" value="HTML">
          <label for="html">HTML</label>
          <input type="checkbox" id="css" name="courses" value="CSS">
          <label for="css">CSS</label>
          <input type="checkbox" id="javascript" name="courses" value="JavaScript">
          <label for="javascript">JavaScript</label>
        </td>
      </tr>
      <tr>
        <td colspan="2">
          <button type="submit">Submit</button>
        </td>
      </tr>
    </table>
  </form>

    <a href="index.html">Home</a>
    <a href="timetable.html">Timetable</a>

</body>
</html>
